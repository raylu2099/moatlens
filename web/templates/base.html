<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Moatlens — Buffett/Munger lens{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        ink: {900: '#0a0e1a', 800: '#12172a', 700: '#1e2541', 600: '#293354'},
                        gold: '#d4af37',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
        .prose-audit h1 { font-size: 1.6rem; font-weight: 700; margin: 1rem 0 0.75rem; }
        .prose-audit h2 { font-size: 1.25rem; font-weight: 600; margin: 1.25rem 0 0.5rem; }
        .prose-audit h3 { font-size: 1.05rem; font-weight: 600; margin: 1rem 0 0.4rem; color: #9ca3af; }
        .prose-audit p { margin-bottom: 0.75rem; line-height: 1.7; }
        .prose-audit ul { margin-left: 1.5rem; margin-bottom: 0.75rem; list-style: disc; }
        .prose-audit ol { margin-left: 1.5rem; margin-bottom: 0.75rem; list-style: decimal; }
        .prose-audit table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; }
        .prose-audit th, .prose-audit td { padding: 0.5rem; border: 1px solid #374151; text-align: left; }
        .prose-audit th { background: #1f2937; font-weight: 600; }
        .prose-audit code { background: #1e293b; padding: 0.1rem 0.3rem; border-radius: 0.25rem; font-family: 'SF Mono', Monaco, monospace; font-size: 0.9em; }
        .prose-audit pre { background: #0b1020; padding: 0.75rem; border-radius: 0.375rem; overflow-x: auto; }
        .prose-audit blockquote { border-left: 3px solid #d4af37; padding-left: 1rem; margin: 0.75rem 0; color: #cbd5e1; }
        form[data-running] button[type=submit] { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body class="bg-ink-900 text-gray-100 min-h-screen">
    <nav class="bg-ink-800 border-b border-ink-700 px-6 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 text-xl font-bold text-white">
                <span class="text-gold">◆</span> Moatlens
                <span class="text-xs text-gray-500 font-normal">v0.2 · self-use</span>
            </a>
            <div class="flex gap-6 text-sm items-center">
                <a href="/" class="hover:text-white text-gray-400">对话</a>
                <a href="/portfolio" class="hover:text-white text-gray-400">持仓</a>
                <a href="/history" class="hover:text-white text-gray-400">历史</a>
                <a href="/wisdom" class="hover:text-white text-gray-400">智慧</a>
                <a href="/learn" class="hover:text-white text-gray-400">概念</a>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
    <footer class="text-center text-gray-600 text-xs py-6 border-t border-ink-700 mt-8">
        Moatlens · 个人思考工具，不构成投资建议
    </footer>
</body>
</html>
