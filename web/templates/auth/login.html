{% extends "base.html" %}
{% block title %}Log in — Moatlens{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12">
    <h1 class="text-2xl font-bold mb-6">Log in</h1>
    {% if error %}<div class="bg-red-900/30 border border-red-800 text-red-300 p-3 rounded mb-4">{{ error }}</div>{% endif %}
    <form method="POST" action="/login" class="space-y-4">
        <div>
            <label class="block text-sm text-gray-400 mb-1">Email</label>
            <input name="email" type="email" required class="w-full bg-ink-800 border border-ink-700 rounded px-3 py-2 text-white">
        </div>
        <div>
            <label class="block text-sm text-gray-400 mb-1">Password</label>
            <input name="password" type="password" required class="w-full bg-ink-800 border border-ink-700 rounded px-3 py-2 text-white">
        </div>
        <button type="submit" class="w-full bg-gold hover:bg-yellow-500 text-ink-900 font-bold py-2 rounded">Log in</button>
    </form>
    <p class="text-sm text-gray-400 mt-4 text-center">No account? <a href="/signup" class="text-gold">Sign up</a></p>
</div>
{% endblock %}
