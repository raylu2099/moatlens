version: '3.8'

services:
  web:
    build: .
    # Localhost-only binding on the host (single-user).
    # If you want to reach it over Tailscale, bind to the tailnet IP instead.
    ports:
      - "127.0.0.1:48291:48291"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
      - ./docs:/app/docs:ro
      - ./prompts:/app/prompts:ro
    environment:
      - PYTHONUNBUFFERED=1
    # Override the image CMD so uvicorn binds to 0.0.0.0 *inside* the container
    # (container port is mapped to 127.0.0.1 on the host — still private).
    command: ["uvicorn", "web.main:app", "--host", "0.0.0.0", "--port", "48291"]
    restart: unless-stopped
